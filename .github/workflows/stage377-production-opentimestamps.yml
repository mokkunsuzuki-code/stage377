name: Stage377 Production OpenTimestamps Verification

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: stage377-production-opentimestamps
  cancel-in-progress: false

jobs:
  verify-opentimestamps:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    env:
      TARGET_PATH: docs/timestamp-evidence/stage376_stage360_timestamp_target.json
      EXPECTED_TARGET_SHA256: 052c8f0283110e405443d56f2396c52a8486e7a70a489f831af107dad73ab1b5
      STAGE376_RESULT_SHA256: 32ff58a1f4d5837518226eee70b32833a8147617df3142ff2f641eca3f116138
      PRIVATE_DIR: private/stage377-timestamps/opentimestamps
      WORK_TARGET_PATH: private/stage377-timestamps/opentimestamps/stage360-target.json
      PROOF_PATH: private/stage377-timestamps/opentimestamps/stage360-target.json.ots
      ENCRYPTED_PROOF_PATH: runner-output/private-continuation/stage360-target.json.ots.enc
      RECEIPT_PATH: runner-output/stage377_opentimestamps_verification_receipt.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare private directory
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p \
            "${PRIVATE_DIR}" \
            runner-output

          test -s "${TARGET_PATH}"

          cp \
            "${TARGET_PATH}" \
            "${WORK_TARGET_PATH}"

      - name: Verify canonical Stage360 target
        shell: bash
        run: |
          set -euo pipefail

          ACTUAL_SHA256="$(
            sha256sum "${TARGET_PATH}" |
            awk '{print $1}'
          )"

          WORK_SHA256="$(
            sha256sum "${WORK_TARGET_PATH}" |
            awk '{print $1}'
          )"

          echo "Repository SHA256: ${ACTUAL_SHA256}"
          echo "Private copy SHA256: ${WORK_SHA256}"
          echo "Expected SHA256:     ${EXPECTED_TARGET_SHA256}"

          test "${ACTUAL_SHA256}" = "${EXPECTED_TARGET_SHA256}"
          test "${WORK_SHA256}" = "${EXPECTED_TARGET_SHA256}"

      - name: Install OpenTimestamps client
        shell: bash
        run: |
          set -euo pipefail

          python3 -m pip install \
            --disable-pip-version-check \
            opentimestamps-client

          ots --version

      - name: Create OpenTimestamps proof
        shell: bash
        run: |
          set -euo pipefail

          ots stamp "${WORK_TARGET_PATH}" \
            > "${PRIVATE_DIR}/stamp.log" 2>&1

          cat "${PRIVATE_DIR}/stamp.log"

          test -s "${PROOF_PATH}"

      - name: Verify OpenTimestamps proof
        shell: bash
        run: |
          set +e

          ots verify "${PROOF_PATH}" \
            > "${PRIVATE_DIR}/verify.log" 2>&1

          VERIFY_EXIT_CODE="$?"

          set -e

          cat "${PRIVATE_DIR}/verify.log"

          echo \
            "VERIFY_EXIT_CODE=${VERIFY_EXIT_CODE}" \
            >> "${GITHUB_ENV}"

          # 新規OTS証明は、ブロックチェーンへの確定まで
          # pendingになることがあります。
          # そのため、ここではWorkflow自体を偽の成功・失敗にせず、
          # 次の工程で事実に基づく状態をJSONへ記録します。
          exit 0

      - name: Encrypt OpenTimestamps continuation proof
        shell: bash
        env:
          OTS_PROOF_PASSPHRASE: ${{ secrets.STAGE377_OTS_PROOF_PASSPHRASE }}
        run: |
          set -euo pipefail

          if [ -z "${OTS_PROOF_PASSPHRASE:-}" ]; then
            echo "ERROR: STAGE377_OTS_PROOF_PASSPHRASE is missing."
            exit 1
          fi

          test -s "${PROOF_PATH}"

          mkdir -p "$(dirname "${ENCRYPTED_PROOF_PATH}")"

          openssl enc             -aes-256-cbc             -pbkdf2             -iter 200000             -salt             -in "${PROOF_PATH}"             -out "${ENCRYPTED_PROOF_PATH}"             -pass env:OTS_PROOF_PASSPHRASE

          test -s "${ENCRYPTED_PROOF_PATH}"

          if cmp -s             "${PROOF_PATH}"             "${ENCRYPTED_PROOF_PATH}"
          then
            echo "ERROR: encrypted proof equals raw proof."
            exit 1
          fi

      - name: Build metadata-only OpenTimestamps receipt
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import hashlib
          import json
          import os
          import re
          import subprocess
          from datetime import datetime, timezone
          from pathlib import Path

          target_path = Path(os.environ["TARGET_PATH"])
          work_target_path = Path(
              os.environ["WORK_TARGET_PATH"]
          )
          proof_path = Path(os.environ["PROOF_PATH"])
          private_dir = Path(os.environ["PRIVATE_DIR"])
          receipt_path = Path(os.environ["RECEIPT_PATH"])

          def sha256_file(path):
              return hashlib.sha256(
                  path.read_bytes()
              ).hexdigest()

          target_sha256 = sha256_file(target_path)
          work_sha256 = sha256_file(work_target_path)
          expected_sha256 = os.environ[
              "EXPECTED_TARGET_SHA256"
          ]

          stamp_log = (
              private_dir / "stamp.log"
          ).read_text(
              encoding="utf-8",
              errors="replace"
          )

          verify_log = (
              private_dir / "verify.log"
          ).read_text(
              encoding="utf-8",
              errors="replace"
          )

          lower_log = verify_log.lower()
          verify_exit_code = int(
              os.environ["VERIFY_EXIT_CODE"]
          )

          anchor_type = None

          if "bitcoin" in lower_log:
              anchor_type = "bitcoin"
          elif "litecoin" in lower_log:
              anchor_type = "litecoin"
          elif "ethereum" in lower_log:
              anchor_type = "ethereum"

          anchor_reference = None

          for pattern in (
              r"(?:block height|height|block)\s*[:#]?\s*(\d+)",
              r"\b([0-9a-f]{64})\b"
          ):
              match = re.search(
                  pattern,
                  verify_log,
                  re.IGNORECASE
              )
              if match:
                  anchor_reference = match.group(1)
                  break

          verified_time = None

          for pattern in (
              r"verified against .*? at (.+)$",
              r"attested .*? at (.+)$",
              r"timestamp verified.*? at (.+)$"
          ):
              match = re.search(
                  pattern,
                  verify_log,
                  re.IGNORECASE | re.MULTILINE
              )
              if match:
                  verified_time = match.group(1).strip()
                  break

          confirmed_public_anchor = all([
              verify_exit_code == 0,
              anchor_type is not None,
              anchor_reference is not None,
              verified_time is not None
          ])

          target_matches = all([
              target_sha256 == expected_sha256,
              work_sha256 == expected_sha256
          ])

          fully_verified = all([
              target_matches,
              confirmed_public_anchor
          ])

          receipt = {
              "stage": 377,
              "engine":
                  "production_opentimestamps_verification",
              "source_stage": 376,
              "previous_hash":
                  os.environ["STAGE376_RESULT_SHA256"],
              "execution_status":
                  "verified"
                  if fully_verified
                  else "pending_confirmation",
              "opentimestamps_verified":
                  fully_verified,
              "verification_exit_code":
                  verify_exit_code,
              "timestamp_target": {
                  "path": str(target_path),
                  "sha256": target_sha256,
                  "stage360_target_sha256":
                      expected_sha256,
                  "digest_matches_stage360":
                      target_matches
              },
              "proof": {
                  "proof_sha256":
                      sha256_file(proof_path),
                  "raw_proof_published": False
              },
              "verification": {
                  "target_hash_matches":
                      target_matches,
                  "confirmed_public_anchor":
                      confirmed_public_anchor,
                  "confirmed_anchor_type":
                      anchor_type,
                  "confirmed_anchor_reference":
                      anchor_reference,
                  "verified_time":
                      verified_time,
                  "verification_output_sha256":
                      hashlib.sha256(
                          verify_log.encode("utf-8")
                      ).hexdigest(),
                  "stamp_output_sha256":
                      hashlib.sha256(
                          stamp_log.encode("utf-8")
                      ).hexdigest(),
                  "client_version":
                      subprocess.run(
                          ["ots", "--version"],
                          check=False,
                          text=True,
                          capture_output=True
                      ).stdout.strip()
              },
              "publication_boundary": {
                  "public_metadata_receipt_only": True,
                  "raw_ots_published": False,
                  "private_key_used": False
              },
              "github_actions": {
                  "repository":
                      os.getenv("GITHUB_REPOSITORY"),
                  "workflow":
                      os.getenv("GITHUB_WORKFLOW"),
                  "run_id":
                      os.getenv("GITHUB_RUN_ID"),
                  "run_attempt":
                      os.getenv("GITHUB_RUN_ATTEMPT"),
                  "commit_sha":
                      os.getenv("GITHUB_SHA"),
                  "ref":
                      os.getenv("GITHUB_REF")
              },
              "generated_at":
                  datetime.now(timezone.utc).isoformat(),
              "note": (
                  "pending_confirmation is expected "
                  "until the OpenTimestamps proof reaches "
                  "a confirmed public blockchain anchor."
              )
          }

          if not target_matches:
              raise SystemExit(
                  "ERROR: OpenTimestamps target mismatch."
              )

          receipt_path.parent.mkdir(
              parents=True,
              exist_ok=True
          )

          receipt_path.write_text(
              json.dumps(
                  receipt,
                  ensure_ascii=False,
                  indent=2,
                  sort_keys=True
              ) + "\n",
              encoding="utf-8"
          )

          print(receipt_path.read_text(encoding="utf-8"))
          PY

      - name: Validate OpenTimestamps publication boundary
        shell: bash
        run: |
          set -euo pipefail

          test -s "${RECEIPT_PATH}"

          if find runner-output -type f \
            \( \
              -name "*.ots" \
              -o -name "*.tsq" \
              -o -name "*.tsr" \
              -o -name "*.tst" \
              -o -name "*.p7s" \
              -o -name "*.pem" \
              -o -name "*.key" \
            \) -print | grep -q .
          then
            echo "ERROR: raw timestamp material entered public output."
            exit 1
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path(
              "runner-output/"
              "stage377_opentimestamps_verification_receipt.json"
          )

          data = json.loads(
              path.read_text(encoding="utf-8")
          )

          allowed_states = {
              "pending_confirmation",
              "verified"
          }

          if data.get("execution_status") not in allowed_states:
              raise SystemExit(
                  "ERROR: unsupported OpenTimestamps state."
              )

          if data.get(
              "publication_boundary",
              {}
          ).get(
              "public_metadata_receipt_only"
          ) is not True:
              raise SystemExit(
                  "ERROR: publication boundary failed."
              )

          print(
              "OpenTimestamps state:",
              data.get("execution_status")
          )
          PY

      - name: Upload OpenTimestamps metadata receipt
        uses: actions/upload-artifact@v4
        with:
          name: stage377-opentimestamps-metadata-receipt
          path: runner-output/stage377_opentimestamps_verification_receipt.json
          if-no-files-found: error
          retention-days: 90

      - name: Upload encrypted OpenTimestamps continuation proof
        uses: actions/upload-artifact@v4
        with:
          name: stage377-opentimestamps-encrypted-continuation
          path: runner-output/private-continuation/stage360-target.json.ots.enc
          if-no-files-found: error
          retention-days: 90

      - name: Delete encrypted runner-output copy
        if: always()
        shell: bash
        run: |
          rm -rf runner-output/private-continuation
          test ! -e runner-output/private-continuation

      - name: Delete raw OpenTimestamps files
        if: always()
        shell: bash
        run: |
          rm -rf "${PRIVATE_DIR}"
          test ! -e "${PRIVATE_DIR}"
